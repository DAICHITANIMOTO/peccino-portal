}
function sum(arr, key) { return arr.reduce((a, b) => a + (b[key] || 0), 0); }
function fmtAvg(x) {
  if (!isFinite(x) || x === 0) return '.000';
  const s = Math.abs(x).toFixed(3);
  return (x < 0 ? '-' : '') + s.replace(/^0/, '');
}
function fmtEra(x) { return isFinite(x) ? x.toFixed(2) : '0.00'; }
function fmtInnings(x) {

}

function gamesForFilter({ year, category, opponent } = {}) {
  return games.filter(g => {
    if (year && year !== 'all' && g.date_sort.slice(0, 4) !== year) return false;
    if (category && category !== 'all' && g.category !== category) return false;
    if (opponent && opponent !== 'all' && g.opponent !== opponent) return false;
    return true;
  });
}

function aggregateBatting(logs) {
  const ab = sum(logs, 'ab'), h = sum(logs, 'h'), bb = sum(logs, 'bb'), hbp = sum(logs, 'hbp'), sf = sum(logs, 'sf');
  const doubles = sum(logs, 'double'), triples = sum(logs, 'triple'), hr = sum(logs, 'hr');
  const singles = h - doubles - triples - hr;
  const tb = singles + doubles * 2 + triples * 3 + hr * 4;
  const ripsAb = sum(logs, 'risp_ab'), rispH = sum(logs, 'risp_h');
  const g = new Set(logs.map(l => l.game_id)).size;
  const avg = ab > 0 ? h / ab : 0;
  const obpDenom = ab + bb + hbp + sf;
  const obp = obpDenom > 0 ? (h + bb + hbp) / obpDenom : 0;
  const slg = ab > 0 ? tb / ab : 0;
  const sac = sum(logs, 'sac'), gdp = sum(logs, 'gdp'), cs = sum(logs, 'cs');
  const sb = sum(logs, 'sb');
  // RC(Runs Created)簡易式: (H+BB)*TB/(AB+BB)、27アウトあたりに正規化
  const rc = (ab + bb) > 0 ? (h + bb) * tb / (ab + bb) : 0;
  const outs = ab - h + cs + gdp + sac + sf;
  return {
    g, pa: sum(logs, 'pa'), ab, h, hr, rbi: sum(logs, 'rbi'), r: sum(logs, 'r'), sb, cs,
    doubles, triples, tb, so: sum(logs, 'so'), bb, hbp, sac, sf, gdp,
    e: sum(logs, 'e'), avg, obp, slg, ops: obp + slg, rispAvg: ripsAb > 0 ? rispH / ripsAb : 0,
    isoD: obp - avg, isoP: slg - avg, rc27: outs > 0 ? rc * 27 / outs : 0,
    sbPct: (sb + cs) > 0 ? sb / (sb + cs) : 0,
  };
}

// FIP定数: リーグ(対象期間の全投手合算)の防御率に合わせる標準的な算出方法
function computeFipConstant(logs) {
  const innings = logs.reduce((a, b) => a + (b.innings || 0), 0);
  if (innings <= 0) return 3.10;
  const er = sum(logs, 'er'), hr = sum(logs, 'hr'), bb = sum(logs, 'bb'), hbp = sum(logs, 'hbp'), so = sum(logs, 'so');
  const era = (er * 9) / innings;
  const rawFip = (13 * hr + 3 * (bb + hbp) - 2 * so) / innings;
  return era - rawFip;
}

function aggregatePitching(logs, fipConstant = 3.10) {
  const innings = logs.reduce((a, b) => a + (b.innings || 0), 0);
  const er = sum(logs, 'er');
  const wins = logs.filter(l => l.decision === '勝').length;
  const losses = logs.filter(l => l.decision === '負').length;
  const saves = logs.filter(l => l.decision === 'S').length;
  const holds = logs.filter(l => l.decision === 'H').length;
  const g = new Set(logs.map(l => l.game_id)).size;
  const so = sum(logs, 'so'), bb = sum(logs, 'bb'), h = sum(logs, 'h'), hr = sum(logs, 'hr'), hbp = sum(logs, 'hbp');
  const rawFip = innings > 0 ? (13 * hr + 3 * (bb + hbp) - 2 * so) / innings : 0;
  return {
    g, wins, losses, saves, holds, innings, era: innings > 0 ? (er * 9) / innings : 0,
    winPct: (wins + losses) > 0 ? wins / (wins + losses) : 0,
    so, bb, h, hr, hbp, er,
    pitches: sum(logs, 'pitches'), runsAllowed: sum(logs, 'r'),
    whip: innings > 0 ? (bb + h) / innings : 0,
    fip: innings > 0 ? rawFip + fipConstant : 0,
    kbb: bb > 0 ? so / bb : (so > 0 ? Infinity : 0),
  };
}

function battingByPlayer(gameIdSet, rosterOnly = true) {
  const map = new Map();
  for (const l of batting_logs) {
    if (!gameIdSet.has(l.game_id)) continue;
    if (rosterOnly && !l.is_roster_member) continue;
    if (!map.has(l.name)) map.set(l.name, []);
    map.get(l.name).push(l);
  }
  return [...map.entries()].map(([name, logs]) => ({ name, number: logs[0].number, ...aggregateBatting(logs) }));
}
function pitchingByPlayer(gameIdSet, rosterOnly = true) {
  const map = new Map();
  const filtered = [];
  for (const l of pitching_logs) {
    if (!gameIdSet.has(l.game_id)) continue;
    if (rosterOnly && !l.is_roster_member) continue;
    filtered.push(l);
    if (!map.has(l.name)) map.set(l.name, []);
    map.get(l.name).push(l);
  }
  const fipConstant = computeFipConstant(filtered);
  return [...map.entries()].map(([name, logs]) => ({ name, number: logs[0].number, ...aggregatePitching(logs, fipConstant) }));
}

function recentByDate(logs, n) {
  return [...logs].sort((a, b) => (gameById[b.game_id]?.date_sort || '').localeCompare(gameById[a.game_id]?.date_sort || '')).slice(0, n);
}
function battingByOpponent(logs) {
  const map = new Map();
  for (const l of logs) {
    const opp = gameById[l.game_id]?.opponent || '(不明)';
    if (!map.has(opp)) map.set(opp, []);
    map.get(opp).push(l);
  }
  return [...map.entries()].map(([opponent, ls]) => ({ opponent, ...aggregateBatting(ls) }));
}
function trendArrow(diff, threshold) {
  if (diff > threshold) return { cls: 'up', label: '↑ 好調' };
  if (diff < -threshold) return { cls: 'down', label: '↓ 不調' };
  return { cls: 'flat', label: '→ 平常' };
}

function byResult(logs, result) {
  return logs.filter(l => gameById[l.game_id]?.result === result);
}

function fmtMonth(ym) {
  const [y, m] = ym.split('-');
  return `${y.slice(2)}/${Number(m)}月`;
}

function monthlyTrend(logs, aggregateFn, extraArg) {
  const map = new Map();
  for (const l of logs) {
    const ym = gameById[l.game_id]?.date_sort?.slice(0, 7);
    if (!ym) continue;
    if (!map.has(ym)) map.set(ym, []);
    map.get(ym).push(l);
  }
  return [...map.entries()]
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([month, ls]) => ({ month, ...aggregateFn(ls, extraArg) }));
}

// シンプルな単一系列の折れ線グラフ(SVG)。ホバー/タップで値を表示する。
// cidは呼び出し側が一意に発行し、attachTrendChartEventsに渡すchartsByIdのキーと一致させること
function renderTrendChart(cid, data, valueKey, { color = 'var(--accent)', fmt = v => v.toFixed(3), height = 108 } = {}) {
  if (data.length < 2) return `<div class="empty-state" style="padding:20px 0">月別推移を表示するにはデータが不足しています</div>`;
  const width = 320;
  const padX = 10, padY = 16;
  const w = width - padX * 2, h = height - padY * 2;
  const values = data.map(d => d[valueKey]);
  const max = Math.max(...values), min = Math.min(...values, 0);
  const range = (max - min) || 1;
  const points = data.map((d, i) => ({
    x: padX + (data.length === 1 ? w / 2 : (i / (data.length - 1)) * w),
    y: padY + h - ((d[valueKey] - min) / range) * h,
    month: d.month,
    value: d[valueKey],
  }));
  const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  const last = points[points.length - 1];
  return `
    <div class="trend-chart-wrap" data-chart="${cid}">
      <svg viewBox="0 0 ${width} ${height}" class="trend-chart" preserveAspectRatio="none" style="height:${height}px">
        <line x1="${padX}" y1="${(padY + h).toFixed(1)}" x2="${width - padX}" y2="${(padY + h).toFixed(1)}" class="trend-baseline" />
        <path d="${pathD}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" />
        ${points.map((p, i) => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${i === points.length - 1 ? 5 : 4}" fill="${color}" stroke="var(--surface)" stroke-width="2" data-idx="${i}" class="trend-dot" />`).join('')}
      </svg>
      <div class="trend-labels"><span>${esc(fmtMonth(points[0].month))}</span><span class="trend-label-end">${esc(fmtMonth(last.month))} <b>${esc(fmt(last.value))}</b></span></div>
      <div class="trend-tooltip" hidden></div>
    </div>
  `;
}

function attachTrendChartEvents(main, chartsById) {
  main.querySelectorAll('.trend-chart-wrap').forEach(wrap => {
    const cid = wrap.dataset.chart;
    const entry = chartsById[cid];
    if (!entry) return;
    const { data, valueKey, fmt } = entry;
    const tooltip = wrap.querySelector('.trend-tooltip');
    wrap.querySelectorAll('.trend-dot').forEach(dot => {
      const idx = Number(dot.dataset.idx);
      const show = () => {
        const d = data[idx];
        tooltip.textContent = `${fmtMonth(d.month)}: ${fmt(d[valueKey])}`;
        tooltip.hidden = false;
        const cx = Number(dot.getAttribute('cx'));
        tooltip.style.left = `${(cx / 320) * 100}%`;
      };
      dot.addEventListener('pointerenter', show);
      dot.addEventListener('pointerdown', show);
      dot.addEventListener('pointerleave', () => { tooltip.hidden = true; });
    });
  });
}

// プロフィール文の末尾に含まれる「賞名(年,年)」形式の受賞歴をパースする
function parseAwards(pr) {
  if (!pr || pr === '-') return [];
  const awards = [];
  const re = /([^\s、,()]{2,})\(([\d,]+)\)/g;
  let m;
  while ((m = re.exec(pr))) {
    const title = m[1];
    for (const y of m[2].split(',')) {
      if (/^\d{2}$/.test(y)) awards.push({ title, year: '20' + y });
    }
  }
  return awards;
}

function resultClass(result) {
  if (result === '勝ち') return 'win';
  if (result === '負け') return 'lose';
  return 'draw';
}

// ---------- routing (Artifact iframe対策: hrefのデフォルト遷移に頼らずJSで完全制御) ----------
const ROUTE_TITLES = { dashboard: 'ダッシュボード', ranking: 'ランキング', players: '選手・メンバー', games: '試合結果', awards: '表彰・タイトル' };

function parseHash() {
  return (location.hash.replace(/^#\/?/, '') || 'dashboard').split('/').filter(Boolean);
}

function router() {
  const parts = parseHash();
  const main = document.getElementById('main');
  updateChrome(parts);
  window.scrollTo(0, 0);
  if (parts[0] === 'ranking') return renderRanking(main);
  if (parts[0] === 'players' && parts[1]) return renderPlayerDetail(main, decodeURIComponent(parts[1]));
  if (parts[0] === 'players') return renderPlayers(main);
  if (parts[0] === 'games' && parts[1]) return renderGameDetail(main, parts[1]);
  if (parts[0] === 'games') return renderGames(main);
  if (parts[0] === 'awards') return renderAwards(main);
  return renderDashboard(main);
}

function updateChrome(parts) {
  const root = parts[0] === 'dashboard' || !ROUTE_TITLES[parts[0]] ? 'dashboard' : parts[0];
  document.querySelectorAll('#tabbar a').forEach(a => a.classList.toggle('active', a.dataset.route === root));
  let title = ROUTE_TITLES[root] || 'ダッシュボード';
  if (root === 'players' && parts[1]) title = decodeURIComponent(parts[1]);
  if (root === 'games' && parts[1]) title = '試合詳細';
  document.getElementById('header-title').textContent = title;
}

function goTo(hash) {
  if (location.hash === '#' + hash) { router(); return; }
  history.pushState(null, '', '#' + hash);
  router();
}

document.addEventListener('click', (e) => {
  const link = e.target.closest('a[data-link]');
  if (!link) return;
  e.preventDefault();
  const hash = link.getAttribute('href').replace(/^#/, '');
  goTo(hash);
});
window.addEventListener('popstate', router);
window.addEventListener('hashchange', router);

function linkAttr(hash) { return `href="#${hash}" data-link`; }

// ---------- Dashboard ----------
function renderDashboard(main) {
  const seasonGames = gamesForFilter({ year: LATEST_YEAR });
  const gameIdSet = new Set(seasonGames.map(g => g.game_id));
  const batters = battingByPlayer(gameIdSet).filter(b => b.ab >= 10);
  const pitchers = pitchingByPlayer(gameIdSet).filter(p => p.innings >= 5);

  const wins = seasonGames.filter(g => g.result === '勝ち').length;
  const losses = seasonGames.filter(g => g.result === '負け').length;
  const draws = seasonGames.filter(g => g.result === '引分け').length;
  const decided = wins + losses;
  const winPct = decided > 0 ? wins / decided : 0;

  const topAvg = [...batters].sort((a, b) => b.avg - a.avg)[0];
  const topHr = [...batters].sort((a, b) => b.hr - a.hr)[0];
  const topRbi = [...batters].sort((a, b) => b.rbi - a.rbi)[0];
  const topSb = [...batters].sort((a, b) => b.sb - a.sb)[0];
  const topOps = [...batters].sort((a, b) => b.ops - a.ops)[0];
  const topEra = [...pitchers].sort((a, b) => a.era - b.era)[0];
  const topWins = [...pitchers].sort((a, b) => b.wins - a.wins)[0];
  const topSo = [...pitchers].sort((a, b) => b.so - a.so)[0];

  const recent = [...games].sort((a, b) => b.date_sort.localeCompare(a.date_sort)).slice(0, 6);

  function leaderCard(label, player, valueFmt) {
    if (!player) return `<div class="card leader-card"><div class="stat-label">${esc(label)}</div><div class="stat-value num">-</div></div>`;
    return `
      <a class="card leader-card" ${linkAttr('/players/' + encodeURIComponent(player.name))}>
        <div class="stat-label">${esc(label)}</div>
        <div class="stat-value num">${valueFmt(player)}</div>
        <div class="stat-player">${esc(player.name)} <span class="stat-number">#${esc(player.number)}</span></div>
      </a>`;
  }

  main.innerHTML = `
    <div class="hero-record card">
      <div class="hero-ring" style="--pct:${(winPct * 100).toFixed(0)}"><div class="hole"><span class="pct num">${(winPct * 100).toFixed(0)}<span style="font-size:10px">%</span></span></div></div>
      <div>
        <div class="rec-main num">${wins}-${losses}-${draws}</div>
        <div class="rec-sub">${esc(LATEST_YEAR)}シーズン ・ 全${seasonGames.length}試合の勝敗</div>
      </div>
    </div>

    <section>
      <h2 class="section-title">打者リーダーボード</h2>
      <div class="leader-scroll">
        ${leaderCard('打率', topAvg, p => fmtAvg(p.avg))}
        ${leaderCard('本塁打', topHr, p => p.hr)}
        ${leaderCard('打点', topRbi, p => p.rbi)}
        ${leaderCard('盗塁', topSb, p => p.sb)}
        ${leaderCard('OPS', topOps, p => fmtAvg(p.ops))}
      </div>
    </section>

    <section>
      <h2 class="section-title">投手リーダーボード</h2>
      <div class="leader-scroll">
        ${leaderCard('防御率', topEra, p => fmtEra(p.era))}
        ${leaderCard('勝利', topWins, p => p.wins)}
        ${leaderCard('奪三振', topSo, p => p.so)}
      </div>
    </section>

    <section>
      <h2 class="section-title">直近の試合結果</h2>
      <div class="card">
        ${recent.map(g => gameRowHtml(g)).join('')}
      </div>
      <div style="margin-top:10px;"><a class="back-link" ${linkAttr('/games')}>全${games.length}試合を見る →</a></div>
    </section>

    <footer class="app-footer">
      <span>出典: teams.one</span>
      <span>${esc(LATEST_YEAR)}年シーズン基準</span>
    </footer>
  `;
}

function gameRowHtml(g) {
  const md = g.date_sort ? g.date_sort.slice(5).replace('-', '/') : '-';
  return `
    <a class="game-row" ${linkAttr('/games/' + g.game_id)}>
      <span class="g-date num">${esc(md)}</span>
      <span class="g-main">
        <span class="g-opponent">${g.category ? `<span class="category-tag">${esc(g.category === '公式戦' ? '公式' : '練習')}</span>` : ''}${esc(g.opponent || '(不明)')}</span>
      </span>
      <span class="g-score num">${g.score_for ?? '-'}-${g.score_against ?? '-'}</span>
      <span class="result-pill ${resultClass(g.result)}">${esc((g.result || '-').replace('ち', '').replace('け', ''))}</span>
    </a>`;
}

// ---------- Awards(表彰・タイトル一覧) ----------
function renderAwards(main) {
  const allAwards = [];
  for (const p of players) {
    for (const a of parseAwards(p.pr)) allAwards.push({ ...a, name: p.name, number: p.number });
  }
  const years = [...new Set(allAwards.map(a => a.year))].sort().reverse();
  const byYear = new Map(years.map(y => [y, new Map()]));
  for (const a of allAwards) {
    const titleMap = byYear.get(a.year);
    if (!titleMap.has(a.title)) titleMap.set(a.title, []);
    titleMap.get(a.title).push(a);
  }

  main.innerHTML = `
    <a class="back-link" ${linkAttr('/players')}>← 選手一覧へ</a>
    <p class="page-sub">選手プロフィールに記載された受賞歴一覧(${allAwards.length}件)</p>
    ${years.map(year => `
      <section>
        <h2 class="section-title">${esc(year)}年</h2>
        <div class="card table-wrap">
          <table class="awards-table">
            <thead><tr><th>タイトル</th><th>受賞者</th></tr></thead>
            <tbody>
              ${[...byYear.get(year).entries()].map(([title, winners]) => `
                <tr>
                  <td>${esc(title)}</td>
                  <td>${winners.map(w => `<a class="clickable" ${linkAttr('/players/' + encodeURIComponent(w.name))}>${esc(w.name)}</a>`).join('、 ')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </section>
    `).join('') || `<div class="empty-state">受賞歴データがありません</div>`}
  `;
}

// ---------- Ranking ----------
let rankingState = { year: LATEST_YEAR, kind: 'batting', metric: 'avg' };
const BATTING_METRICS = [
  ['avg', '打率', v => fmtAvg(v.avg)], ['hr', '本塁打', v => v.hr], ['rbi', '打点', v => v.rbi],
  ['sb', '盗塁', v => v.sb], ['ops', 'OPS', v => fmtAvg(v.ops)], ['obp', '出塁率', v => fmtAvg(v.obp)],
  ['slg', '長打率', v => fmtAvg(v.slg)], ['h', '安打', v => v.h],
  ['isoP', 'IsoP(長打力)', v => fmtAvg(v.isoP)], ['isoD', 'IsoD(選球眼)', v => fmtAvg(v.isoD)],
  ['rc27', 'RC27(創出得点)', v => v.rc27.toFixed(2)],
  ['sbPct', '盗塁成功率', v => (v.sb + v.cs) > 0 ? fmtAvg(v.sbPct) : '-'],
];
const PITCHING_METRICS = [
  ['era', '防御率', v => fmtEra(v.era)], ['wins', '勝利', v => v.wins], ['so', '奪三振', v => v.so],
  ['saves', 'セーブ', v => v.saves], ['holds', 'ホールド', v => v.holds], ['innings', '投球回', v => fmtInnings(v.innings)],
  ['whip', 'WHIP', v => v.whip.toFixed(2)], ['fip', 'FIP', v => v.fip.toFixed(2)],
  ['kbb', 'K/BB', v => isFinite(v.kbb) ? v.kbb.toFixed(2) : '∞'],
];
const ASC_METRICS = new Set(['era', 'whip', 'fip']);

function renderRanking(main) {
  const gameIdSet = new Set(gamesForFilter({ year: rankingState.year }).map(g => g.game_id));
  const isBatting = rankingState.kind === 'batting';
  const metrics = isBatting ? BATTING_METRICS : PITCHING_METRICS;
  if (!metrics.find(m => m[0] === rankingState.metric)) rankingState.metric = metrics[0][0];

  let rows = isBatting ? battingByPlayer(gameIdSet) : pitchingByPlayer(gameIdSet);
  rows = rows.filter(r => isBatting ? r.ab >= 5 : r.innings >= 1);
  const asc = isBatting ? false : ASC_METRICS.has(rankingState.metric);
  rows.sort((a, b) => asc ? a[rankingState.metric] - b[rankingState.metric] : b[rankingState.metric] - a[rankingState.metric]);

  const metricDef = metrics.find(m => m[0] === rankingState.metric);

  main.innerHTML = `
    <p class="page-sub">最低出場条件: 打者=打数5以上 / 投手=投球回1以上</p>

    <div class="filter-bar">
      <div class="chip-group">
        <button class="chip ${isBatting ? 'active' : ''}" data-kind="batting">打者</button>
        <button class="chip ${!isBatting ? 'active' : ''}" data-kind="pitching">投手</button>
      </div>
      <select id="year-select">
        <option value="all" ${rankingState.year === 'all' ? 'selected' : ''}>全期間</option>
        ${YEARS.map(y => `<option value="${y}" ${rankingState.year === y ? 'selected' : ''}>${y}年</option>`).join('')}
      </select>
      <select id="metric-select">
        ${metrics.map(([k, label]) => `<option value="${k}" ${rankingState.metric === k ? 'selected' : ''}>${esc(label)}</option>`).join('')}
      </select>
      <span class="result-count">${rows.length}名</span>
    </div>

    <div class="card table-wrap">
      <table>
        <thead><tr><th>順位</th><th>選手</th><th class="num-h">試合</th><th class="num-h">${esc(metricDef[1])}</th><th class="num-h">${isBatting ? 'OPS' : '防御率'}</th></tr></thead>
        <tbody>
          ${rows.map((r, i) => `
            <tr class="clickable" data-name="${esc(r.name)}">
              <td class="num"><span class="rank-num">${i + 1}</span></td>
              <td>${esc(r.name)} <span class="stat-number num" style="color:var(--ink-faint)">#${esc(r.number)}</span></td>
              <td class="num">${r.g}</td>
              <td class="num highlight">${metricDef[2](r)}</td>
              <td class="num">${isBatting ? fmtAvg(r.ops) : fmtEra(r.era)}</td>
            </tr>
          `).join('') || `<tr><td colspan="5" class="empty-state">該当データがありません</td></tr>`}
        </tbody>
      </table>
    </div>
  `;

  main.querySelectorAll('.chip[data-kind]').forEach(el => el.addEventListener('click', () => {
    rankingState.kind = el.dataset.kind;
    renderRanking(main);
  }));
  main.querySelector('#year-select').addEventListener('change', e => { rankingState.year = e.target.value; renderRanking(main); });
  main.querySelector('#metric-select').addEventListener('change', e => { rankingState.metric = e.target.value; renderRanking(main); });

// ---------- Player detail ----------
let playerDetailYear = 'all';
function renderPlayerDetail(main, name) {
  const player = playerByName[name];
  const allBattingLogs = batting_logs.filter(l => l.name === name);
  const allPitchingLogs = pitching_logs.filter(l => l.name === name);

  if (!player && allBattingLogs.length === 0 && allPitchingLogs.length === 0) {
    main.innerHTML = `<div class="empty-state">選手が見つかりませんでした</div>`;
    return;
  }

  const years = [...new Set([...allBattingLogs, ...allPitchingLogs].map(l => gameById[l.game_id]?.date_sort.slice(0, 4)))].filter(Boolean).sort().reverse();
  if (!years.includes(playerDetailYear) && playerDetailYear !== 'all') playerDetailYear = 'all';

  const gameIdSet = playerDetailYear === 'all' ? null : new Set(gamesForFilter({ year: playerDetailYear }).map(g => g.game_id));
  const battingLogs = gameIdSet ? allBattingLogs.filter(l => gameIdSet.has(l.game_id)) : allBattingLogs;
  const pitchingLogs = gameIdSet ? allPitchingLogs.filter(l => gameIdSet.has(l.game_id)) : allPitchingLogs;

  const bat = aggregateBatting(battingLogs);
  const leaguePitchingLogs = pitching_logs.filter(l => (gameIdSet ? gameIdSet.has(l.game_id) : true) && l.is_roster_member);
  const pit = aggregatePitching(pitchingLogs, computeFipConstant(leaguePitchingLogs));

  const gameLogRows = recentByDate(battingLogs, battingLogs.length);

  // 直近の調子(通算フィルタに関わらず、直近の実試合ベースで判定)
  const recentBat = aggregateBatting(recentByDate(allBattingLogs, 5));
  const recentBatTrend = trendArrow(recentBat.avg - bat.avg, 0.03);
  const recentPitchLogs = recentByDate(allPitchingLogs, 5);
  const recentPit = aggregatePitching(recentPitchLogs, computeFipConstant(pitching_logs.filter(l => l.is_roster_member)));
  const recentPitTrend = trendArrow(pit.era - recentPit.era, 0.5);

  const oppRows = battingByOpponent(allBattingLogs).filter(r => r.ab >= 2).sort((a, b) => b.ab - a.ab);

  const leagueFipConstant = computeFipConstant(pitching_logs.filter(l => l.is_roster_member));
  const battingTrendData = monthlyTrend(allBattingLogs, aggregateBatting).filter(d => d.ab >= 1);

  const loseBat = aggregateBatting(byResult(allBattingLogs, '負け'));

let calState = { year: null, month: null, selectedDay: null };
function renderGamesCalendar(body) {
  const allYm = games.map(g => g.date_sort?.slice(0, 7)).filter(Boolean).sort();
  const minYm = allYm[0], maxYm = allYm[allYm.length - 1];
  if (!calState.year) {
    const [y, m] = maxYm.split('-');
    calState.year = Number(y);
    calState.month = Number(m);
  }
  const { year, month } = calState;
  const ym = `${year}-${String(month).padStart(2, '0')}`;
  const gamesInMonth = games.filter(g => g.date_sort?.startsWith(ym));
  const byDay = new Map();
  for (const g of gamesInMonth) {
    const day = Number(g.date_sort.slice(8, 10));
    if (!byDay.has(day)) byDay.set(day, []);
    byDay.get(day).push(g);
  }
  const firstDow = new Date(year, month - 1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const dows = ['日', '月', '火', '水', '木', '金', '土'];

  const cellsHtml = [];
  for (let i = 0; i < firstDow; i++) cellsHtml.push(`<div class="cal-cell empty"></div>`);
  for (let d = 1; d <= daysInMonth; d++) {
    const gs = byDay.get(d) || [];
    let cls = 'cal-cell';
    if (gs.length === 1) cls += ' has-game result-' + resultClass(gs[0].result);
    else if (gs.length > 1) cls += ' has-game result-multi';
    if (calState.selectedDay === d) cls += ' selected';
    cellsHtml.push(`<div class="${cls}" data-day="${d}"><span class="cal-daynum">${d}</span>${gs.length ? `<span class="cal-dot"></span>` : ''}</div>`);
  }

  const selectedGames = calState.selectedDay ? (byDay.get(calState.selectedDay) || []) : [];

  body.innerHTML = `
    <div class="card" style="padding:14px 16px;">
      <div class="cal-nav">
        <button id="cal-prev" ${ym === minYm ? 'disabled' : ''}>‹</button>
        <span class="cal-month-label">${year}年${month}月</span>
        <button id="cal-next" ${ym === maxYm ? 'disabled' : ''}>›</button>
      </div>
      <div class="cal-grid">
        ${dows.map(d => `<div class="cal-dow">${d}</div>`).join('')}
        ${cellsHtml.join('')}
      </div>
    </div>
    ${selectedGames.length ? `<div class="card" style="margin-top:10px;">${selectedGames.map(g => gameRowHtml(g)).join('')}</div>` : ''}
  `;

  body.querySelector('#cal-prev')?.addEventListener('click', () => {
    calState.month--; if (calState.month < 1) { calState.month = 12; calState.year--; }
    calState.selectedDay = null;
    renderGamesCalendar(body);
  });
  body.querySelector('#cal-next')?.addEventListener('click', () => {
    calState.month++; if (calState.month > 12) { calState.month = 1; calState.year++; }
    calState.selectedDay = null;
    renderGamesCalendar(body);
  });
  body.querySelectorAll('.cal-cell.has-game').forEach(cell => {
    cell.addEventListener('click', () => {
      const day = Number(cell.dataset.day);
      calState.selectedDay = calState.selectedDay === day ? null : day;
      renderGamesCalendar(body);
    });
  });
}

      <div class="card table-wrap">
        <table>
          <thead><tr><th>#</th><th>選手</th><th class="num-h">打順</th><th class="num-h">守備</th><th class="num-h">打数</th><th class="num-h">安打</th><th class="num-h">本塁</th><th class="num-h">打点</th><th class="num-h">得点</th><th class="num-h">盗塁</th></tr></thead>
          <tbody>
            ${batting.map(l => `<tr class="clickable" data-name="${esc(l.name)}">
              <td class="num">${esc(l.number)}</td><td>${esc(l.name)}</td><td class="num">${l.order}</td><td class="num">${esc(l.position)}</td>
              <td class="num">${l.ab}</td><td class="num">${l.h}</td><td class="num">${l.hr}</td><td class="num">${l.rbi}</td><td class="num">${l.r}</td><td class="num">${l.sb}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </section>` : ''}

    ${pitching.length ? `
    <section>
      <h2 class="section-title">投球成績</h2>
      <div class="card table-wrap">
        <table>
          <thead><tr><th>#</th><th>選手</th><th class="num-h">勝敗</th><th class="num-h">投球回</th><th class="num-h">失点</th><th class="num-h">自責点</th><th class="num-h">被安打</th><th class="num-h">奪三振</th></tr></thead>
          <tbody>
            ${pitching.map(l => `<tr class="clickable" data-name="${esc(l.name)}">
              <td class="num">${esc(l.number)}</td><td>${esc(l.name)}</td><td class="num">${esc(l.decision)}</td><td class="num">${fmtInnings(l.innings)}</td>
              <td class="num">${l.r}</td><td class="num">${l.er}</td><td class="num">${l.h}</td><td class="num">${l.so}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </section>` : `<p class="page-sub">この試合の投球成績記録はありません</p>`}
  `;

  main.querySelectorAll('tbody tr.clickable').forEach(tr => tr.addEventListener('click', () => goTo(`/players/${encodeURIComponent(tr.dataset.name)}`)));
}

router();

</script>
